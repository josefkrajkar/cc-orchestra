name: CI

on:
  push:
  pull_request:

jobs:
  test-mcp-server:
    name: Test & build orchestra-memory MCP server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.12 is the dev-toolchain floor: vitest 4's rolldown/vite bindings
        # declare engines ^20.19.0 || >=22.12.0, and npm silently skips
        # optional deps that fail the engine check — on 22.5 the native
        # binding is never installed and vitest crashes at startup.
        # (Runtime floor of the built server itself stays 22.5 / node:sqlite.)
        node-version: ["22.12", "latest"]
    defaults:
      run:
        working-directory: packages/orchestra-memory/mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-boot — --help
        run: node dist/server.mjs --help

      - name: Smoke-boot — --backup --keep 7
        run: node dist/server.mjs --backup --keep 7

  shellcheck:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck packages/*/scripts/*.sh
